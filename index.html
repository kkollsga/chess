<!DOCTYPE html>
<html lang="en" data-theme="classic">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="description" content="A chess game tuned for iPhone — tap or drag, sound, haptics, AI opponent, daily puzzle.">
  <meta name="theme-color" content="#1a202c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chess">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/favicon.png" type="image/png">
  <title>Chess</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-[100dvh] flex items-center justify-center">
  <div class="game-container flex flex-col gap-3 items-center w-full h-[100dvh] max-w-[1100px] min-w-[320px] mx-auto px-3 py-2">

    <!-- Top bar: streak + black indicator + status -->
    <div class="flex items-center justify-between w-full">
      <div id="streak-display" class="text-xs font-semibold text-amber-600 min-w-[80px]"></div>
      <div id="black-indicator" class="px-5 py-2 rounded-xl text-sm font-bold text-gray-400">Player Black</div>
      <div id="status" class="text-xs font-medium text-gray-600 min-w-[80px] text-right"></div>
    </div>

    <!-- Board area: eval bar + black captures + board + white captures -->
    <div class="flex w-full gap-2 flex-grow items-stretch justify-center">

      <!-- Eval bar (hidden when coach disabled) -->
      <div class="flex flex-col items-center justify-center pt-1 pb-1 w-[18px]">
        <div id="eval-bar" class="h-full">
          <div id="eval-bar-fill"></div>
          <div id="eval-bar-label"></div>
        </div>
      </div>

      <!-- Black captures (left of board) -->
      <div id="black-captures" class="side-board flex flex-col items-end pt-1 w-[40px] min-w-[36px]">
        <div class="advantage text-xs font-semibold text-gray-700 mb-1"></div>
        <div class="pieces-container flex flex-wrap-reverse content-end justify-end gap-0.5"></div>
      </div>

      <!-- Board with banner container -->
      <div id="board-container" class="relative flex items-center justify-center flex-grow max-w-[min(96vw,96vh-180px)]">
        <div class="w-full aspect-square">
          <div id="board" class="w-full h-full grid grid-cols-8 border-2 border-gray-800 bg-white shadow-xl rounded-sm overflow-hidden"></div>
        </div>
      </div>

      <!-- White captures (right of board) -->
      <div id="white-captures" class="side-board flex flex-col items-start pb-1 w-[40px] min-w-[36px]">
        <div class="pieces-container flex flex-wrap content-start justify-start gap-0.5"></div>
        <div class="advantage text-xs font-semibold text-gray-700 mt-1"></div>
      </div>
    </div>

    <!-- White indicator -->
    <div id="white-indicator" class="px-5 py-2 rounded-xl text-sm font-bold text-gray-400">Player White</div>

    <!-- Move list -->
    <div id="move-list" class="w-full max-w-[600px] overflow-x-auto whitespace-nowrap text-sm text-gray-700 min-h-[28px] px-2"></div>

    <!-- Navigation -->
    <div id="navigation" class="flex items-center justify-center gap-3 pb-1">
      <button class="nav-start w-9 h-9 rounded-full flex items-center justify-center text-gray-700 hover:bg-gray-200 disabled:opacity-30" aria-label="Start">⏮</button>
      <button class="nav-back  w-10 h-10 rounded-full flex items-center justify-center text-gray-800 hover:bg-gray-200 disabled:opacity-30" aria-label="Back">◀</button>
      <div class="move-number font-bold text-gray-700 text-sm min-w-[40px] text-center"></div>
      <button class="nav-forward w-10 h-10 rounded-full flex items-center justify-center text-gray-800 hover:bg-gray-200 disabled:opacity-30" aria-label="Forward">▶</button>
      <button class="nav-end   w-9 h-9 rounded-full flex items-center justify-center text-gray-700 hover:bg-gray-200 disabled:opacity-30" aria-label="End">⏭</button>
    </div>
  </div>

  <!-- Burger menu -->
  <div id="burger-menu" class="fixed top-3 left-3 z-50" style="top:calc(env(safe-area-inset-top) + .75rem)">
    <button id="menu-button" class="p-2 rounded-lg bg-white/95 shadow-lg" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/>
      </svg>
    </button>
    <div id="menu-dropdown" class="hidden absolute left-0 mt-2 w-56 bg-white rounded-lg shadow-xl py-1">
      <button id="btn-new-game"     class="w-full text-left px-4 py-2 text-sm text-green-700 hover:bg-green-50">New game</button>
      <button id="btn-toggle-ai"    class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Toggle AI opponent</button>
      <button id="btn-flip-board"   class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Flip board</button>
      <button id="btn-daily-puzzle" class="w-full text-left px-4 py-2 text-sm text-amber-700 hover:bg-amber-50">Daily puzzle</button>
      <div class="border-t my-1"></div>
      <button id="btn-import-pgn" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Import PGN</button>
      <button id="btn-export-pgn" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Copy PGN</button>
      <button id="btn-import-fen" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Import FEN</button>
      <div class="border-t my-1"></div>
      <button id="btn-settings" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Settings</button>
    </div>
  </div>

  <!-- PGN modal -->
  <div id="pgn-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl p-5 w-full max-w-2xl shadow-2xl">
      <h2 class="text-xl font-bold mb-3">Import PGN</h2>
      <textarea id="pgn-input" class="w-full h-56 p-3 border rounded-lg font-mono text-sm mb-3" placeholder="Paste PGN here…"></textarea>
      <div class="flex justify-end gap-2">
        <button id="pgn-cancel"  class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100">Cancel</button>
        <button id="pgn-confirm" class="px-4 py-2 rounded-lg bg-gray-800 text-white hover:bg-gray-700">Import</button>
      </div>
    </div>
  </div>

  <!-- FEN modal -->
  <div id="fen-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl p-5 w-full max-w-2xl shadow-2xl">
      <h2 class="text-xl font-bold mb-3">Import FEN</h2>
      <input id="fen-input" class="w-full p-3 border rounded-lg font-mono text-sm mb-3" placeholder="rnbqkbnr/pppppppp/…">
      <div class="flex justify-end gap-2">
        <button id="fen-cancel"  class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100">Cancel</button>
        <button id="fen-confirm" class="px-4 py-2 rounded-lg bg-gray-800 text-white hover:bg-gray-700">Import</button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl p-5 w-full max-w-md shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Settings</h2>
        <button id="settings-close" class="text-gray-500 hover:text-gray-800 text-2xl leading-none" aria-label="Close">×</button>
      </div>

      <div class="space-y-3 text-sm">
        <label class="flex items-center justify-between gap-2">
          <span>Sound effects</span>
          <input type="checkbox" data-setting="sound" class="w-5 h-5">
        </label>
        <label class="flex items-center justify-between gap-2">
          <span>Haptic feedback</span>
          <input type="checkbox" data-setting="haptics" class="w-5 h-5">
        </label>
        <label class="flex items-center justify-between gap-2">
          <span>Show legal-move hints</span>
          <input type="checkbox" data-setting="showHints" class="w-5 h-5">
        </label>
        <label class="flex items-center justify-between gap-2">
          <span>Coach + eval bar</span>
          <input type="checkbox" data-setting="coach" class="w-5 h-5">
        </label>
        <label class="flex items-center justify-between gap-2">
          <span>Show coordinates</span>
          <input type="checkbox" data-setting="showCoords" class="w-5 h-5">
        </label>
        <label class="flex items-center justify-between gap-2">
          <span>Auto-save game</span>
          <input type="checkbox" data-setting="autoSave" class="w-5 h-5">
        </label>

        <div class="border-t pt-3"></div>

        <label class="flex items-center justify-between gap-2">
          <span>AI opponent</span>
          <input type="checkbox" data-setting="aiEnabled" class="w-5 h-5">
        </label>
        <label class="flex items-center justify-between gap-2">
          <span>AI plays as</span>
          <select data-setting="aiColor" class="border rounded px-2 py-1">
            <option value="b">Black</option>
            <option value="w">White</option>
          </select>
        </label>
        <label class="flex items-center justify-between gap-2">
          <span>AI strength (depth)</span>
          <select data-setting="aiDepth" data-kind="number" class="border rounded px-2 py-1">
            <option value="1">Easy</option>
            <option value="2">Medium</option>
            <option value="3">Hard</option>
            <option value="4">Expert (slow)</option>
          </select>
        </label>

        <div class="border-t pt-3"></div>

        <label class="flex items-center justify-between gap-2">
          <span>Theme</span>
          <select data-setting="theme" class="border rounded px-2 py-1">
            <option value="classic">Classic wood</option>
            <option value="midnight">Midnight</option>
            <option value="emerald">Emerald</option>
            <option value="rose">Rose</option>
            <option value="slate">Slate</option>
          </select>
        </label>
      </div>

      <div class="flex justify-between mt-4">
        <button id="settings-reset" class="px-3 py-2 text-xs rounded-lg text-red-600 hover:bg-red-50">Reset defaults</button>
        <button id="settings-done" class="px-4 py-2 rounded-lg bg-gray-800 text-white">Done</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
